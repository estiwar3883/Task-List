<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Task List App Icon</title>
  <desc id="desc">A minimal dark app icon with a glowing gradient checkmark.</desc>
  <defs>
    <radialGradient id="halo" cx="50%" cy="42%" r="58%">
      <stop offset="0" stop-color="#164e63"/>
      <stop offset="0.48" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="check" x1="150" y1="300" x2="372" y2="178" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.5" stop-color="#2dd4bf"/>
      <stop offset="1" stop-color="#bef264"/>
    </linearGradient>
    <filter id="softGlow" x="78" y="92" width="356" height="326" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.18 0 0 0 0 0.83 0 0 0 0 0.82 0 0 0 0.7 0"/>
      <feBlend in="SourceGraphic"/>
    </filter>
    <filter id="shadow" x="86" y="116" width="340" height="284" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#halo)"/>
  <circle cx="256" cy="256" r="164" fill="#020617" opacity="0.28"/>
  <path
    d="m157 265 73 73 132-164"
    fill="none"
    stroke="url(#check)"
    stroke-width="50"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />
  <path
    d="m157 265 73 73 132-164"
    fill="none"
    stroke="#f8fafc"
    stroke-width="16"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.22"
    filter="url(#shadow)"
  />
</svg>
